<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Summarizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/summarizer.css') }}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/nav_bar.css')}}">
</head>
<body>
    <nav class="nav_bar">
        <div class="left-section">
            <div class="nav_logo">
                <img src="{{url_for('static',filename='img/logo_png.png')}}" width="50" height="45">
            </div>
            <a id="home_link" href="/"><div class="nav_title"> Rabbit</div></a>

        </div>
    <div class="right-section">
        <div class="nav_items"> <a id="home_link"href="/">Home</a></div>
        <div class="nav_items"> <a id="home_link"href="test.html">Documentation</a></div>
        <div class="nav_items"> <a id="home_link"href="/team">Team</a></div>
        <div class="nav_items"> <a id="home_link"href="/about">About</a></div>
    </div>
</nav>
    <div class="container">
        <!-- Input Section -->
        <div class="input-section">
            <form action="/summarizer" method="post" enctype="multipart/form-data">
                <label for="text-input">Enter the text:</label>
                <input id="text-input" type="text" name="text" placeholder="Type or paste your text here..." required>
                <button class="button" type="submit">Summarize</button>
            </form>
        </div>

        <!-- Original Text Output Section -->
        {%if input_text%}
        <div class="output original-text">
            <h2>Original Text:</h2>
            <p>{{input_text}}</p>
        </div>
        {%endif%}

        <!-- Spell-Checked Text Output Section -->
        {%if summarized%}
        <div class="output summarized-text">
            <h2>Summarized Text:</h2>
            <p>{{summarized}}</p>
        </div>
        {%endif%}
    </div>
</body>
</html>
